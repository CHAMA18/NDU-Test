<!DOCTYPE html>
<html>
<head>
  <base href="/NDU-Test/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NDU Project - Navigate. Deliver. Upgrade.">

  <!-- Aggressive cache prevention — ensures users always see the latest version -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NDU Project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=1781195800">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=1781195800"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1781195800"/>

  <title>NDU Project</title>
  <link rel="manifest" href="manifest.json?v=1781195800">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
    }
    .loading-container {
      text-align: center;
      color: #94a3b8;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(148, 163, 184, 0.2);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading NDU Project...</div>
  </div>
  <!-- Runtime environment config — loaded BEFORE Flutter so keys are
       available when EnvConfigLoader.load() runs in main(). -->
  <script src="env-config.js?v=1781195800"></script>

  <!-- ULTRA AGGRESSIVE cache bust: kill ALL service workers, clear ALL caches, force redirect -->
  <script>
    (function() {
      var NDU_BUILD = '1781195800';
      try {
        // 1. Kill ALL service workers immediately (synchronous attempt)
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) {
              reg.unregister().then(function() {
                console.log('[NDU] Killed service worker:', reg.scope);
              });
            });
          });
          // Also prevent any new service worker from registering
          navigator.serviceWorker.register = function() { return Promise.resolve(); };
        }

        // 2. Nuke ALL Cache API entries
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name).then(function() {
                console.log('[NDU] Deleted cache:', name);
              });
            });
          });
        }

        // 3. Clear ALL localStorage keys related to old builds
        localStorage.removeItem('__ndu_build');

        // 4. If this page was loaded WITHOUT a cache-busting param, redirect WITH one
        //    This forces the browser to fetch fresh from server, bypassing any cached HTML/JS
        var url = new URL(location.href);
        if (!url.searchParams.has('_ndu')) {
          url.searchParams.set('_ndu', NDU_BUILD);
          localStorage.setItem('__ndu_build', NDU_BUILD);
          location.replace(url.toString());
          return; // Stop execution — page will reload
        }

        // 5. If the param exists but is from an OLD build, redirect with NEW param
        var loadedBuild = url.searchParams.get('_ndu');
        if (loadedBuild && loadedBuild !== NDU_BUILD) {
          url.searchParams.set('_ndu', NDU_BUILD);
          localStorage.setItem('__ndu_build', NDU_BUILD);
          location.replace(url.toString());
          return;
        }

        localStorage.setItem('__ndu_build', NDU_BUILD);
      } catch(e) {
        console.warn('[NDU] Cache bust error:', e);
      }
    })();
  </script>

  <script src="flutter_bootstrap.js?v=1781195800" async></script>
</body>
</html>
